<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Venn Diskspace</title>
  <script src="d3.v7.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; }
    #chart { width: 100%; height: 90vh; }
    .node { cursor: pointer; }
    .label { text-anchor: middle; pointer-events: none; }
    #controls { margin: 10px; display: flex; align-items: center; gap: 8px; }
    #status { font-size: 13px; color: #666; margin-left: 8px; }
  </style>
</head>
<body>
  <div id="controls">
    <input type="text" id="dirInput" placeholder="Enter absolute directory path" style="width:300px;">
    <button onclick="loadData()">Scan</button>
    <button onclick="goBack()">Back</button>
    <span id="status"></span>
  </div>
  <svg id="chart"></svg>

  <script>
    const invoke = window.__TAURI__.core.invoke;

    let currentData = null;
    let history = [];

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      let units = ["KB", "MB", "GB", "TB"];
      let i = -1;
      do {
        bytes = bytes / 1024;
        i++;
      } while (bytes >= 1024 && i < units.length - 1);
      return bytes.toFixed(1) + " " + units[i];
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function render(data) {
      currentData = data;
      const width = window.innerWidth;
      const height = window.innerHeight * 0.85;
      const svg = d3.select("#chart")
        .attr("width", width)
        .attr("height", height);
      svg.selectAll("*").remove();

      const pack = d3.pack().size([width, height]).padding(5);
      const root = d3.hierarchy(data, d => d.children).sum(d => d.size);
      pack(root);

      const node = svg.selectAll("g")
        .data(root.children || [])
        .enter().append("g")
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .attr("class", "node")
        .on("click", (event, d) => {
          if (d.data.children && d.data.children.length > 0) {
            history.push(currentData);
            render(d.data);
          }
        });

      node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", "#69b3a2")
        .attr("opacity", 0.7);

      const MIN_LABEL_RADIUS = 20;

      node.filter(d => d.r >= MIN_LABEL_RADIUS)
        .append("text")
        .attr("class", "label")
        .each(function(d) {
          const el = d3.select(this);
          const lines = [d.data.name, `${d.data.files} files`, formatSize(d.data.size)];
          const lineHeight = 1.2;
          const startDy = -((lines.length - 1) / 2) * lineHeight;
          lines.forEach((line, i) => {
            el.append("tspan")
              .attr("x", 0)
              .attr("dy", i === 0 ? `${startDy}em` : `${lineHeight}em`)
              .style("font-size", d.r > 50 ? "11px" : "9px")
              .text(line);
          });
        });
    }

    function loadData() {
      const dir = document.getElementById("dirInput").value.trim();
      if (!dir) return alert("Please enter a directory path.");
      setStatus("Scanning...");
      invoke("scan_directory", { path: dir })
        .then(data => {
          history = [];
          setStatus(`Showing: ${dir}`);
          render(data);
        })
        .catch(err => {
          setStatus("Error");
          alert(err);
        });
    }

    function goBack() {
      if (history.length > 0) {
        const prev = history.pop();
        setStatus(`Showing: ${prev.name}`);
        render(prev);
      }
    }
  </script>
</body>
</html>
