<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Venn Diskspace</title>
  <script src="d3.v7.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; }
    #chart { width: 100%; height: 90vh; background: #b2dfdb; }
    .node { cursor: pointer; }
    .label { text-anchor: middle; pointer-events: none; }
    #controls { margin: 10px; display: flex; align-items: center; gap: 8px; }
    #status { font-size: 13px; color: #666; margin-left: 8px; }
    #pathDisplay {
      position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
      font-size: 15px; font-weight: bold; color: #333; background: rgba(255,255,255,0.85);
      padding: 2px 10px; border-radius: 4px; pointer-events: none;
      white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
    }
    #status { display: inline-flex; align-items: center; gap: 8px; }
    .scan-text {
      font-size: 13px; color: #e65c00; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <input type="text" id="dirInput" placeholder="Enter absolute directory path" value="/" style="width:300px;">
    <button onclick="loadData()">Scan</button>
    <button onclick="goBack()">Back</button>
    <span id="status"></span>
  </div>
  <svg id="chart"></svg>
  <div id="pathDisplay"></div>

  <script>
    const invoke = window.__TAURI__.core.invoke;

    let currentData = null;
    let currentPath = "/";
    let history = [];

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      let units = ["KB", "MB", "GB", "TB"];
      let i = -1;
      do {
        bytes = bytes / 1024;
        i++;
      } while (bytes >= 1024 && i < units.length - 1);
      return bytes.toFixed(1) + " " + units[i];
    }

    const statusEl = document.getElementById("status");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function setStatusScanning() {
      statusEl.innerHTML = '<span class="scan-text">SCANNiNG...</span>';
    }

    function childPath(name) {
      return currentPath.replace(/\/$/, "") + "/" + name;
    }

    function render(data, path) {
      currentData = data;
      if (path !== undefined) currentPath = path;
      const width = window.innerWidth;
      const height = window.innerHeight * 0.85;
      const svg = d3.select("#chart")
        .attr("width", width)
        .attr("height", height);
      svg.selectAll("*").remove();

      const pack = d3.pack().size([width, height]).padding(5);
      const root = d3.hierarchy(data, d => d.children).sum(d => d.size);
      pack(root);

      const color = d3.scaleOrdinal(d3.schemeTableau10);
      const pathDisplay = document.getElementById("pathDisplay");

      const node = svg.selectAll("g")
        .data(root.children || [])
        .enter().append("g")
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .attr("class", "node")
        .on("mouseover", (event, d) => {
          pathDisplay.textContent = childPath(d.data.name);
        })
        .on("mouseout", () => {
          pathDisplay.textContent = "";
        })
        .on("click", (event, d) => {
          if (d.data.children && d.data.children.length > 0) {
            history.push({ data: currentData, path: currentPath });
            render(d.data, childPath(d.data.name));
          }
        });

      node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", (d, i) => color(i))
        .attr("opacity", 0.75);

      const MIN_LABEL_RADIUS = 20;

      node.filter(d => d.r >= MIN_LABEL_RADIUS)
        .append("text")
        .attr("class", "label")
        .each(function(d) {
          const el = d3.select(this);
          const lines = [d.data.name, `${d.data.files} files`, formatSize(d.data.size)];
          const lineHeight = 1.2;
          const startDy = -((lines.length - 1) / 2) * lineHeight;
          lines.forEach((line, i) => {
            el.append("tspan")
              .attr("x", 0)
              .attr("dy", i === 0 ? `${startDy}em` : `${lineHeight}em`)
              .style("font-size", d.r > 50 ? "11px" : "9px")
              .text(line);
          });
        });
    }

    function loadData() {
      const dir = document.getElementById("dirInput").value.trim();
      if (!dir) return alert("Please enter a directory path.");
      setStatusScanning();
      const scanStart = Date.now();
      requestAnimationFrame(() => {
        invoke("scan_directory", { path: dir })
          .then(data => {
            const delay = Math.max(0, 400 - (Date.now() - scanStart));
            setTimeout(() => {
              history = [];
              setStatus(`Showing: ${dir}`);
              render(data, dir);
            }, delay);
          })
          .catch(err => {
            setStatus("Error");
            alert(err);
          });
      });
    }

    function goBack() {
      if (history.length > 0) {
        const prev = history.pop();
        setStatus(`Showing: ${prev.path}`);
        render(prev.data, prev.path);
      }
    }
  </script>
</body>
</html>
